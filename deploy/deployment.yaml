apiVersion: apps/v1
kind: Deployment
metadata:
  name: igniter-example-host
  labels:
    app.kubernetes.io/name: igniter
    app.kubernetes.io/instance: example-host
spec:
  # KEDA owns this. 0 = power intent off, 1 = power intent on.
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: igniter
      app.kubernetes.io/instance: example-host
  template:
    metadata:
      labels:
        app.kubernetes.io/name: igniter
        app.kubernetes.io/instance: example-host
    spec:
      serviceAccountName: igniter
      # Must exceed (IGNITER_DRAIN_TIMEOUT + ~2m) + IGNITER_POWEROFF_TIMEOUT so the
      # drain AND the verified power-off (soft-off -> wait -> hard-off) both finish
      # before Kubernetes SIGKILLs the pod.
      terminationGracePeriodSeconds: 900
      # Pin this pod to a node that never sleeps. Edit the label to match your cluster.
      nodeSelector:
        example.com/always-on: "true"
      containers:
        - name: igniter
          image: ghcr.io/<you>/igniter:latest
          imagePullPolicy: IfNotPresent
          env:
            # Core identity and node lifecycle.
            - name: IGNITER_HOST
              value: "example-host"
            - name: IGNITER_NODES
              value: "example-node-1,example-node-2"
            - name: IGNITER_DRAIN_TIMEOUT
              value: "5m"
            - name: IGNITER_BOOT_TIMEOUT
              value: "12m"
            # Budget for the power-off (soft-off -> verify -> hard-off fallback).
            - name: IGNITER_POWEROFF_TIMEOUT
              value: "5m"

            # Scale-down safety: igniter checks this Deployment before powering off.
            - name: IGNITER_DEPLOYMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: IGNITER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # Driver: Wake-on-LAN on, SSH shutdown off.
            - name: IGNITER_POWER
              value: "wol"
            - name: WOL_MAC
              value: "REPLACE_WITH_TARGET_MAC"
            - name: WOL_BROADCAST
              value: "REPLACE_WITH_LAN_BROADCAST:9"
            - name: SSH_ADDR
              value: "REPLACE_WITH_HOST_OR_IP:22"
            - name: SSH_USER
              value: "root"
            - name: SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: igniter-secrets
                  key: SSH_PASSWORD
                  optional: true
            - name: SSH_KEY
              valueFrom:
                secretKeyRef:
                  name: igniter-secrets
                  key: SSH_KEY
                  optional: true
            # Optional WoL power-off tuning (defaults 3m / 90s / 15s): Off runs
            # `shutdown -h now`, waits WOL_SOFT_GRACE for the host to go offline,
            # then a best-effort forced power-off (waiting WOL_HARD_GRACE),
            # polling reachability every WOL_POLL_INTERVAL.
            # - name: WOL_SOFT_GRACE
            #   value: "3m"
            # - name: WOL_HARD_GRACE
            #   value: "90s"
            # - name: WOL_POLL_INTERVAL
            #   value: "15s"

            # Alternative driver: IPMI. Set IGNITER_POWER=ipmi and uncomment.
            # - name: IPMI_ADDR
            #   value: "REPLACE_WITH_BMC_HOST_OR_IP"
            # - name: IPMI_USER
            #   value: "root"
            # - name: IPMI_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: igniter-secrets
            #       key: IPMI_PASSWORD
            # Optional IPMI power-off tuning (defaults 3m / 90s / 15s): the driver
            # sends an ACPI soft-off, waits IPMI_SOFT_GRACE for it to take effect,
            # then escalates to a hard power-down (waiting IPMI_HARD_GRACE),
            # polling power state every IPMI_POLL_INTERVAL.
            # - name: IPMI_SOFT_GRACE
            #   value: "3m"
            # - name: IPMI_HARD_GRACE
            #   value: "90s"
            # - name: IPMI_POLL_INTERVAL
            #   value: "15s"

            # Alternative driver: Proxmox. Set IGNITER_POWER=proxmox and uncomment.
            # - name: PVE_URL
            #   value: "https://REPLACE_WITH_PVE_HOST:8006"
            # - name: PVE_TOKEN_ID
            #   value: "REPLACE_WITH_TOKEN_ID"
            # - name: PVE_TOKEN_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: igniter-secrets
            #       key: PVE_TOKEN_SECRET
            # - name: PVE_NODE
            #   value: "REPLACE_WITH_PVE_NODE"
            # - name: PVE_VMIDS
            #   value: "REPLACE_WITH_VMID_LIST"
            # Optional Proxmox power-off tuning (defaults 3m / 90s / 15s): Off runs
            # a graceful per-VM shutdown, waits PVE_SOFT_GRACE, then hard-stops any
            # straggler (waiting PVE_HARD_GRACE), polling every PVE_POLL_INTERVAL.
            # - name: PVE_SOFT_GRACE
            #   value: "3m"
            # - name: PVE_HARD_GRACE
            #   value: "90s"
            # - name: PVE_POLL_INTERVAL
            #   value: "15s"
